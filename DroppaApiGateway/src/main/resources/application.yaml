spring:
  application:
    name: DroppaApiGateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**,/api/v1/user/**,/api/v1/wallet/**

            - id: user-service-api-docs
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/v3/api-docs/user-service
              filters:
                - SetPath=/v3/api-docs

            - id: booking-service
              uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/booking/**,/api/v1/rental/**

            - id: booking-service-api-docs
              uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/v3/api-docs/booking-service
              filters:
                - SetPath=/v3/api-docs

            - id: driver-service
              uri: ${DRIVER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/v1/drivers/**,/api/v1/admin/**,/api/v1/courier/**,/company/**,/vehicle/**

            - id: driver-service-api-docs
              uri: ${DRIVER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/v3/api-docs/driver-service
              filters:
                - SetPath=/v3/api-docs

server:
  port: ${SERVER_PORT:8089}

security:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-that-must-be-changed-before-production}

springdoc:
   swagger-ui:
     path: /swagger-ui.html
     disable-swagger-default-url: true
     urls:
       - name: User Service
         url: /v3/api-docs/user-service
       - name: Booking Service
         url: /v3/api-docs/booking-service
       - name: Driver Service
         url: /v3/api-docs/driver-service
