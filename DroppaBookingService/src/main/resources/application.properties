spring.application.name=DroppaBookingService

server.port=${SERVER_PORT:8082}

# Database
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/droppa}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Internal services
services.user.url=${USER_SERVICE_URL:http://localhost:8081}

# Server-owned booking tariffs
booking.pricing.vehicle-base-prices.MINI_VAN=${BOOKING_PRICE_MINI_VAN:350.00}
booking.pricing.vehicle-base-prices.ONE_TON=${BOOKING_PRICE_ONE_TON:500.00}
booking.pricing.vehicle-base-prices.ONE_POINT_FIVE_TON=${BOOKING_PRICE_ONE_POINT_FIVE_TON:650.00}
booking.pricing.vehicle-base-prices.FOUR_TON=${BOOKING_PRICE_FOUR_TON:1200.00}
booking.pricing.vehicle-base-prices.EIGHT_TON=${BOOKING_PRICE_EIGHT_TON:2000.00}
booking.pricing.price-per-additional-load=${BOOKING_PRICE_ADDITIONAL_LOAD:100.00}
booking.pricing.price-per-labour=${BOOKING_PRICE_LABOUR:150.00}

# SMTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
