# IntelliJ services connect to infrastructure published by the Docker dev profile.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:${MYSQL_HOST_PORT:3308}/${MYSQL_DATABASE:droppa}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:droppa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:droppa-local-password}}
services.user.url=${USER_SERVICE_URL:http://localhost:8081}
services.booking.url=${BOOKING_SERVICE_URL:http://localhost:8082}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:${KAFKA_HOST_PORT:29092}}
