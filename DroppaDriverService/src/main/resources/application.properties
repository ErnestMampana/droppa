spring.application.name=DroppaDriverService
spring.profiles.default=dev

# Database
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/droppa}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Internal services
services.user.url=${USER_SERVICE_URL:http://localhost:8081}
services.booking.url=${BOOKING_SERVICE_URL:http://localhost:8082}

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record

# Driver booking notifications
app.driver-notifications.resend-after=${DRIVER_NOTIFICATION_RESEND_AFTER:PT2M}
app.driver-notifications.resend-interval-ms=${DRIVER_NOTIFICATION_RESEND_INTERVAL_MS:120000}

# SMTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}

server.port=${SERVER_PORT:8083}
