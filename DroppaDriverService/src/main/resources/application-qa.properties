# QA services run inside Docker and address dependencies by Compose service name.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/${MYSQL_DATABASE:droppa}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:droppa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:droppa-local-password}}
services.user.url=${USER_SERVICE_URL:http://user-service:8081}
services.booking.url=${BOOKING_SERVICE_URL:http://booking-service:8082}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
